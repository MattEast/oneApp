<!-- User Registration Form UI Mockup (HTML/CSS) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Form Mockup</title>
  <style>
    body {
      background: #f7f7f7;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-container {
      background: #fff;
      padding: 2rem 2.5rem;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      width: 350px;
      max-width: 90vw;
    }
    .logo {
      display: block;
      margin: 0 auto 1rem auto;
      width: 60px;
      height: 60px;
      background: #e0e0e0;
      border-radius: 50%;
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    label {
      display: block;
      margin-bottom: 0.25rem;
      font-weight: 500;
      color: #444;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }
    .register-btn {
      width: 100%;
      padding: 0.75rem;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: background 0.2s;
    }
    .register-btn:hover {
      background: #1565c0;
    }
    .login-link {
      text-align: center;
      color: #555;
      font-size: 0.95rem;
    }
    .login-link a {
      color: #1976d2;
      text-decoration: none;
      font-weight: 500;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo"></div>
    <h2>Register</h2>
    <form>
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Create a password" required>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Confirm your password" required>

      <button class="register-btn" type="submit">Register</button>
    </form>
    <div class="login-link">
      Already have an account? <a href="#">Login</a>
    </div>
  </div>
</body>
</html>
