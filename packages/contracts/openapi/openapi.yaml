        message:
          type: string
          description: Optional customer-facing explanation when status is degraded.
    RecurringObligation:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        amount:
          type: number
          description: Derived GBP amount exposed in major currency units. Internal recurring-obligation calculations use minor units.
        cadence:
          type: string
          enum:
            - monthly
            - four_weekly
        paymentType:
          type: string
        category:
          type: string
        dueDay:
          type: integer
        monthlyAmount:
          type: number
        confidence:
          type: number
        occurrenceCount:
          type: integer
        source:
          type: string
        sourceTransactionIds:
          type: array
          items:
            type: string
        lastSeenAt:
          type: string
          format: date-time
    RecurringObligationListResponse:
      type: object
      properties:
        recurringObligations:
          type: array
          items:
            $ref: '#/components/schemas/RecurringObligation'
    PasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    PasswordResetResponse:
      type: object
      properties:
        message:
          type: string
    PasswordResetConfirmRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password
    PasswordResetConfirmResponse:
      type: object
      properties:
        message:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
