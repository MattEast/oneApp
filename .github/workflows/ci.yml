name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      - name: Run backend tests
        run: |
          cd backend
          npm test
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      - name: Run frontend tests
        run: |
          cd frontend
          npm test
      - name: Run contract validation and drift checks
        run: |
          npm run lint:contracts
      - name: Run ESLint
        continue-on-error: true
        run: |
          npx --yes eslint@8.57.1 backend frontend
      - name: Run Prettier check
        continue-on-error: true
        run: |
          npx --yes prettier --check "**/*.{js,jsx,json,md}"
      - name: Check for forbidden Python files
        run: |
          if ls backend/*.py 1> /dev/null 2>&1; then echo "Python files found in backend!" && exit 1; fi
